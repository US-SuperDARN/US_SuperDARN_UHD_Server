name: Enforce Branch Naming
on: push

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - uses: deepakputhraya/action-branch-name@master
        with:
          regex: '([a-z])+\/([a-z])+'
          allowed_prefixes: 'feat,fix,hotfix,dev'
          ignore: devel,stable
          
